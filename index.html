<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balcones Verdes y Nativos | Semana del Árbol & Club de Roma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fdfbf7; color: #1a2b22; scroll-behavior: smooth; }
        h1, h2, h3, .brand { font-family: 'Playfair Display', serif; }
        #map { height: 550px; width: 100%; border-radius: 4px; z-index: 1; background: #e5e7eb; }
        .hero-overlay { background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.3)); }
        .bg-nativa { background-color: #1a2b22; }
    </style>
</head>
<body>

    <nav class="py-6 px-10 flex justify-between items-center bg-[#fdfbf7]/90 backdrop-blur-sm border-b border-stone-200 sticky top-0 z-50">
        <div class="brand text-xl tracking-tighter">
            Balcones <span class="italic font-light text-green-800">Verdes & Nativos</span>
        </div>
        <div class="hidden md:flex space-x-8 text-[10px] uppercase tracking-[0.2em] font-bold text-stone-400">
            <a href="#proyecto" class="hover:text-green-800 transition">El Proyecto</a>
            <a href="#mapa" class="hover:text-green-800 transition">Corredores</a>
            <a href="#inscripcion" class="text-green-800 border-b border-green-800 pb-1">Participar</a>
        </div>
    </nav>

    <section class="relative h-[60vh] flex items-center overflow-hidden">
        <img src="https://images.unsplash.com/photo-1598902108854-10e335adac99?auto=format&fit=crop&q=80&w=2000" class="absolute inset-0 w-full h-full object-cover" alt="Balcón nativo">
        <div class="absolute inset-0 hero-overlay"></div>
        <div class="container mx-auto px-10 relative z-10 text-white">
            <h1 class="text-6xl mb-4 leading-[0.9] tracking-tighter">Regenerá la <br> <span class="italic font-light">Biodiversidad.</span></h1>
            <p class="text-xl font-light max-w-2xl opacity-90">Sumate a la red de biocorredores urbanos de Buenos Aires.</p>
        </div>
    </section>

    <section id="mapa" class="py-24 bg-white">
        <div class="container mx-auto px-10">
            <div class="text-center mb-10">
                <h2 class="text-4xl mb-2 italic text-[#1a2b22]">Mapa Vivo de Oasis</h2>
                <p class="text-stone-500 text-sm">Los puntos tardan 5-10 min en aparecer tras la inscripción.</p>
            </div>
            <div id="map" class="shadow-2xl"></div>
        </div>
    </section>

    <section id="inscripcion" class="py-24 bg-[#fdfbf7]">
        <div class="container mx-auto px-10 max-w-4xl">
            <div class="bg-white border border-stone-200 p-8 md:p-16 shadow-sm">
                <h2 class="text-4xl mb-12 italic text-center text-[#1a2b22]">Inscribí tu Balcón</h2>
                <form id="formInscripcion" class="space-y-8">
                    <div class="grid md:grid-cols-2 gap-8">
                        <input type="text" id="nombreInput" placeholder="Tu nombre" class="w-full p-4 border-b border-stone-200 focus:outline-none focus:border-green-800 italic" required>
                        <input type="text" id="ubicacionInput" placeholder="Dirección (Ej: Vera 24, CABA)" class="w-full p-4 border-b border-stone-200 focus:outline-none focus:border-green-800 italic" required>
                    </div>
                    <input type="text" id="especiesInput" placeholder="¿Qué especies tenés? (Ej: Salvia, Pasionaria)" class="w-full p-4 border-b border-stone-200 focus:outline-none focus:border-green-800 italic">
                    
                    <div class="border-2 border-dashed border-stone-100 p-8 text-center rounded">
                        <label class="block text-[10px] uppercase font-bold text-stone-400 mb-2">Foto del Balcón (Máx 2MB)</label>
                        <input type="file" id="fotoInput" accept="image/*" class="text-xs text-stone-400">
                    </div>

                    <button type="submit" id="btnEnviar" class="w-full bg-[#1a2b22] text-white py-6 text-[10px] uppercase tracking-[0.4em] font-bold hover:bg-green-900 transition">
                        Enviar Inscripción
                    </button>
                </form>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- CONFIGURACIÓN (REVISÁ QUE ESTOS LINKS SEAN CORRECTOS) ---
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTRlJp60yfSmHX_iRFaEN2UUEE9RJWDbrwiDtB7zULooQChUzYPM2d7VcWF_jzFW9PcUKpuK60aEM-y/pub?gid=0&single=true&output=csv";
        const urlScript = "https://script.google.com/macros/s/AKfycbwv6FGbUWNwo6acJl_epBvdn1VVShyWA-j4KKmxu3He6WJwIYhrj1q9xhuTHW3HGLk4bg/exec";

        // --- INICIALIZAR MAPA ---
        var map = L.map('map').setView([-34.6037, -58.3816], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- CARGAR PUNTOS ---
        async function cargarPuntos() {
            try {
                const res = await fetch(csvUrl);
                const csvText = await res.text();
                const lineas = csvText.split("\n").slice(1);
                lineas.forEach(linea => {
                    const col = linea.split(",");
                    if (col.length >= 7 && !isNaN(col[5]) && !isNaN(col[6])) {
                        L.marker([parseFloat(col[5]), parseFloat(col[6])])
                         .addTo(map)
                         .bindPopup(`<b>${col[0]}</b><br>${col[2]}`);
                    }
                });
            } catch (err) { console.error("Error cargando puntos", err); }
        }
        cargarPuntos();

        // --- PROCESAR ENVÍO ---
        document.getElementById('formInscripcion').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEnviar');
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            const nombre = document.getElementById('nombreInput').value;
            const ubicacion = document.getElementById('ubicacionInput').value;
            const especies = document.getElementById('especiesInput').value;
            const fotoFile = document.getElementById('fotoInput').files[0];

            try {
                // 1. Geolocalización
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(ubicacion + ", Buenos Aires")}`);
                const geoData = await geoRes.json();
                const lat = geoData.length > 0 ? geoData[0].lat : -34.60;
                const lon = geoData.length > 0 ? geoData[0].lon : -58.38;

                // 2. Procesar Foto a Base64
                let archivoBase64 = "Sin foto";
                if (fotoFile) {
                    const reader = new FileReader();
                    archivoBase64 = await new Promise(resolve => {
                        reader.onload = () => resolve(reader.result.split(',')[1]);
                        reader.readAsDataURL(fotoFile);
                    });
                }

                // 3. Enviar a Google
                const payload = {
                    nombre, ubicacion, especies, lat, lon,
                    archivo: archivoBase64,
                    mimetype: fotoFile ? fotoFile.type : ""
                };

                await fetch(urlScript, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                alert("¡Inscripción Exitosa! Los puntos en el mapa tardan unos minutos en aparecer.");
                location.reload();
            } catch (err) {
                alert("Error en el envío. Reintentá.");
                btn.innerText = "ENVIAR INSCRIPCIÓN";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
